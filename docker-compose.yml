services:
  postgres:
    image: postgres:16
    container_name: meeting_assistant_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meeting_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-meeting_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeting_assistant_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-meeting_assistant} -d ${POSTGRES_DB:-meeting_assistant}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
